<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Beverage Orders☕</title>

  <style>
    body { font-family: Arial, sans-serif; color: #222; margin: 0; padding: 0; }
    .container { max-width: 720px; margin: 0 auto; padding: 20px; }
    h1 { margin: 0 0 16px 0; }
    .hint { color: #666; font-size: 12px; margin-top: 4px; }
    .field { margin: 12px 0; }
    label { display: block; font-weight: 600; margin-bottom: 6px; }
    input[type="text"], input[type="email"], select, textarea {
      width: 100%;
      max-width: 520px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
    textarea { min-height: 90px; resize: vertical; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .row > * { flex: 1 1 180px; }
    .time-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .time-row select { min-width: 140px; width: auto; }
    .btn {
      appearance: none;
      border: 0;
      border-radius: 8px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
      background: #8B4513;
      color: #fff;
    }
    .btn[disabled] { opacity: 0.6; cursor: not-allowed; }
    .card {
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 16px;
      margin-top: 16px;
    }
  </style>

  <script>
    // IMPORTANT: set to your current GAS /exec URL
    window.GAS_DEPLOYMENT_URL =
      window.GAS_DEPLOYMENT_URL ||
      "https://script.google.com/macros/s/AKfycbwa-oR3rF4J30NzDwAwZmVasKibjgRrP35k_lw4pV4H_7pq1YixlYEJvofhAEwD-FMbPg/exec";
  </script>
</head>

<body>
  <div class="container">
    <h1>Beverage Orders</h1>

    <!-- Add a non-form, focusable top element so the browser doesn't jump to the first select -->
    <a id="top" href="#" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;">top</a>

    <div class="card">
      <div class="field">
        <label for="name">Name</label>
        <input id="name" type="text" autocomplete="name" inputmode="text" />
      </div>

      <div class="field">
        <label for="email">Email (optional)</label>
        <input id="email" type="email" autocomplete="email" inputmode="email" />
        <div class="hint">If you opt in below, we’ll send a confirmation email.</div>
      </div>

      <div class="field">
        <label>
          <input id="emailOptIn" type="checkbox" />
          Email me a confirmation
        </label>
      </div>

      <div class="field">
        <label><strong>Pick-up Time</strong></label>
        <div class="time-row">
          <select id="pickupHour" name="pickupHour" required>
            <option value="">Hour</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
          </select>

          <select id="pickupMinute" name="pickupMinute" required>
            <option value="">Minutes</option>
            <!-- populated by script -->
          </select>

          <span><strong>PM</strong></span>
        </div>
        <div class="hint">Times are between 2:00 PM and 4:59 PM for this event.</div>
      </div>

      <!-- Minimal beverage fields so payload is meaningful (adjust to your real UI later) -->
      <div class="row">
        <div class="field">
          <label for="temperature">Temperature</label>
          <select id="temperature">
            <option value="">(select)</option>
            <option value="Hot">Hot</option>
            <option value="Iced">Iced</option>
          </select>
        </div>

        <div class="field">
          <label for="caffeination">Caffeination</label>
          <select id="caffeination">
            <option value="">(select)</option>
            <option value="Caffeinated">Caffeinated</option>
            <option value="Decaf">Decaf</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="beverage">Beverage</label>
          <input id="beverage" type="text" placeholder="e.g., Latte" />
        </div>

        <div class="field">
          <label for="milk">Milk</label>
          <input id="milk" type="text" placeholder="e.g., Oat" />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="style">Style</label>
          <input id="style" type="text" placeholder="e.g., Vanilla" />
        </div>

        <div class="field">
          <label for="item">Item</label>
          <input id="item" type="text" placeholder="e.g., 12oz" />
        </div>
      </div>

      <div class="field">
        <label for="specialInstructions">Special Instructions</label>
        <textarea id="specialInstructions" placeholder="Anything we should know?"></textarea>
      </div>

      <button id="submitBtn" class="btn" type="button">Submit Order</button>
    </div>
  </div>

  <script>
    // Populate minutes 00-59
    (function initMinutes() {
      const minSel = document.getElementById("pickupMinute");
      for (let i = 0; i < 60; i++) {
        const mm = String(i).padStart(2, "0");
        const opt = document.createElement("option");
        opt.value = String(i);   // numeric minute as string
        opt.textContent = mm;    // display 2-digit minute
        minSel.appendChild(opt);
      }
    })();

    // Prevent the browser from auto-focusing the first form control (which can scroll to pickup time)
    window.addEventListener("load", () => {
      // force initial scroll to top
      window.scrollTo(0, 0);

      // remove any unexpected focus (e.g., restored session focus)
      if (document.activeElement && document.activeElement !== document.body) {
        document.activeElement.blur();
      }

      // focus a hidden "top" anchor to keep scroll position stable
      const top = document.getElementById("top");
      if (top) top.focus({ preventScroll: true });
    });
