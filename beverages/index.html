<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Beverage Orders</title>

  <style>
    .time-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .time-row select { min-width: 110px; }
    .time-hint { color: #666; font-size: 12px; margin-top: 4px; }
  </style>

  <script>
    // IMPORTANT: set to your current GAS /exec URL
    window.GAS_DEPLOYMENT_URL = window.GAS_DEPLOYMENT_URL || "https://script.google.com/macros/s/AKfycbwa-oR3rF4J30NzDwAwZmVasKibjgRrP35k_lw4pV4H_7pq1YixlYEJvofhAEwD-FMbPg/exec";
  </script>
</head>
<body>

  <!-- Replace your old pickup time UI with this -->
  <div>
    <label for="pickupHour"><strong>Pick-up Time</strong></label>
    <div class="time-row">
      <select id="pickupHour" name="pickupHour" required>
        <option value="">Hour</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
      </select>

      <select id="pickupMinute" name="pickupMinute" required>
        <option value="">Minutes</option>
        <!-- populated by script -->
      </select>

      <!-- This event: PM fixed. For future events, swap to an AM/PM dropdown. -->
      <span><strong>PM</strong></span>
    </div>
    <div class="time-hint">Times are between 2:00 PM and 4:59 PM for this event.</div>
  </div>

  <button id="submitBtn" type="button">Submit Order</button>

  <script>
    // Populate minutes 00-59
    (function initMinutes() {
      const minSel = document.getElementById("pickupMinute");
      for (let i = 0; i < 60; i++) {
        const mm = String(i).padStart(2, "0");
        const opt = document.createElement("option");
        opt.value = String(i);       // numeric minute as string
        opt.textContent = mm;        // display 2-digit minute
        minSel.appendChild(opt);
      }
    })();

    function getPickupTimeObject_() {
      const hourStr = document.getElementById("pickupHour").value;
      const minuteStr = document.getElementById("pickupMinute").value;

      if (!hourStr || minuteStr === "") return null;

      const hour = Number(hourStr);
      const minute = Number(minuteStr);

      // Hours constrained to 2-4 for this event
      if (!Number.isFinite(hour) || hour < 2 || hour > 4) return null;
      if (!Number.isFinite(minute) || minute < 0 || minute > 59) return null;

      return { hour, minute, ampm: "PM" };
    }

    async function submitOrder_() {
      if (!window.GAS_DEPLOYMENT_URL || window.GAS_DEPLOYMENT_URL.includes("/.../exec")) {
        alert("GAS deployment URL is not configured.");
        return;
      }

      const pickupTime = getPickupTimeObject_();
      if (!pickupTime) {
        alert("Please select a pick-up hour (2–4) and minutes (00–59).");
        return;
      }

      // NOTE: Replace these field lookups with your real form element IDs.
      const order = {
        pickupTime, // canonical form consumed by Code.gs
        name: (document.getElementById("name")?.value || "").trim(),
        temperature: (document.getElementById("temperature")?.value || "").trim(),
        caffeination: (document.getElementById("caffeination")?.value || "").trim(),
        beverage: (document.getElementById("beverage")?.value || "").trim(),
        style: (document.getElementById("style")?.value || "").trim(),
        item: (document.getElementById("item")?.value || "").trim(),
        milk: (document.getElementById("milk")?.value || "").trim(),
        flavors: [],   // TODO: map from your UI
        toppings: [],  // TODO: map from your UI
        specialInstructions: (document.getElementById("specialInstructions")?.value || "").trim(),
        emailOptIn: Boolean(document.getElementById("emailOptIn")?.checked),
        email: (document.getElementById("email")?.value || "").trim()
      };

      const res = await fetch(window.GAS_DEPLOYMENT_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(order)
      });

      const json = await res.json();
      if (!res.ok || !json.success) {
        throw new Error(json.error || `Request failed (HTTP ${res.status})`);
      }

      alert("Order submitted successfully.");
    }

    document.getElementById("submitBtn").addEventListener("click", () => {
      submitOrder_().catch(err => {
        console.error(err);
        alert(err.message || String(err));
      });
    });
  </script>
</body>
</html>
